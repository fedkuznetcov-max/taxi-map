<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор адреса на карте</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="controls">
            <div class="address-panel">
                <div id="selectedAddress">📍 Нажмите на карту, чтобы выбрать точку</div>
            </div>
            <div class="button-group">
                <button id="confirmBtn" class="btn primary" disabled>✅ Подтвердить адрес</button>
                <button id="cancelBtn" class="btn secondary">❌ Отмена</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
